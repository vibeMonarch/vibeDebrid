# =============================================================================
# vibeDebrid — Docker Compose stack
#
# Prerequisites:
#   - Real-Debrid API key (https://real-debrid.com/apitoken)
#   - TMDB API key (https://www.themoviedb.org/settings/api)
#
# Configuration: copy .env.example to .env and fill in your values.
# All UPPER_CASE variables below can be set in .env to override defaults.
# =============================================================================

services:
  # =========================================================================
  # Infrastructure services (Zurg, rclone, Zilean, PostgreSQL)
  # =========================================================================

  zurg:
    image: ghcr.io/debridmediamanager/zurg-testing:latest
    container_name: zurg
    restart: unless-stopped
    volumes:
      - ./data/zurg/config.yml:/app/config.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f -o /dev/null -s http://localhost:9090/http/version.txt || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 120s
      retries: 5
    networks:
      - vibedebrid

  rclone:
    image: rclone/rclone:latest
    container_name: rclone
    restart: unless-stopped
    depends_on:
      zurg:
        condition: service_healthy
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    security_opt:
      - apparmor:unconfined
    command: >
      mount rclone_RD: /data/mnt
      --config /config/rclone.conf
      --allow-other
      --allow-non-empty
      --poll-interval=0
      --dir-cache-time=10s
      --attr-timeout=1s
      --vfs-cache-mode=writes
      --vfs-read-ahead=128M
      --vfs-read-chunk-size=1M
      --vfs-read-chunk-size-limit=32M
      --buffer-size=64M
      --cache-info-age=48h
      --tpslimit=10
      --tpslimit-burst=10
      --uid=${PUID:-1000}
      --gid=${PGID:-1000}
    volumes:
      - ./data/rclone/rclone.conf:/config/rclone.conf:ro
      - ${ZURG_MOUNT_HOST_PATH:-/opt/homeserver/Zurg/mnt}:/data/mnt:rshared
    healthcheck:
      test: ["CMD", "ls", "/data/mnt/__all__"]
      interval: 15s
      timeout: 10s
      start_period: 30s
      retries: 5
    networks:
      - vibedebrid

  postgres:
    image: postgres:16-alpine
    container_name: zilean-postgres
    restart: unless-stopped
    # Zilean's VACUUM ANALYZE after ingestion needs more than Docker's 64MB default
    shm_size: 256m
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zilean}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zilean}
      POSTGRES_DB: ${POSTGRES_DB:-zilean}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zilean}"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    networks:
      - vibedebrid

  zilean:
    image: ipromknight/zilean:latest
    container_name: zilean
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${ZILEAN_PORT:-8182}:8181"
    environment:
      Zilean__Database__ConnectionString: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-zilean};Username=${POSTGRES_USER:-zilean};Password=${POSTGRES_PASSWORD:-zilean}"
      Zilean__Dmm__MinimumScoreMatch: "${ZILEAN_MIN_SCORE:-0.85}"
      Zilean__Dmm__ScrapeSchedule: "17 * * * *"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/healthchecks/ping"]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 5
    networks:
      - vibedebrid

  # =========================================================================
  # vibeDebrid
  # =========================================================================

  vibedebrid:
    image: ${VIBE_IMAGE:-vibemonarch/vibedebrid:latest}
    container_name: vibedebrid
    restart: unless-stopped
    depends_on:
      rclone:
        condition: service_healthy
    ports:
      - "${VIBE_PORT:-5100}:5100"
    environment:
      VIBE_DATA_DIR: /data
      VIBE_REAL_DEBRID__API_KEY: ${RD_API_KEY:-}
      VIBE_TMDB__API_KEY: ${TMDB_API_KEY:-}
      VIBE_SCRAPERS__ZILEAN__BASE_URL: ${ZILEAN_URL:-http://zilean:8181}
      VIBE_PATHS__ZURG_MOUNT: ${ZURG_MOUNT_HOST_PATH:-/opt/homeserver/Zurg/mnt}/__all__
      VIBE_PATHS__LIBRARY_MOVIES: ${LIBRARY_MOVIES:-/opt/homeserver/mnt/Movies}
      VIBE_PATHS__LIBRARY_SHOWS: ${LIBRARY_SHOWS:-/opt/homeserver/mnt/TV Shows}
      # Media server URLs — use host.docker.internal for services running on the host
      VIBE_PLEX__URL: ${PLEX_URL:-http://host.docker.internal:32400}
      VIBE_JELLYFIN__URL: ${JELLYFIN_URL:-http://host.docker.internal:8096}
      TZ: ${TZ:-UTC}
    volumes:
      - ./data:/data
      # rshared propagation lets vibeDebrid see the FUSE mount from rclone
      - ${ZURG_MOUNT_HOST_PATH:-/opt/homeserver/Zurg/mnt}:${ZURG_MOUNT_HOST_PATH:-/opt/homeserver/Zurg/mnt}:rshared,ro
      - ${LIBRARY_MOVIES:-/opt/homeserver/mnt/Movies}:${LIBRARY_MOVIES:-/opt/homeserver/mnt/Movies}:rw
      - ${LIBRARY_SHOWS:-/opt/homeserver/mnt/TV Shows}:${LIBRARY_SHOWS:-/opt/homeserver/mnt/TV Shows}:rw
    extra_hosts:
      # Allows reaching services on the host machine (Plex, Jellyfin) via host.docker.internal
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5100/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    labels:
      com.centurylinklabs.watchtower.scope: vibedebrid
    networks:
      - vibedebrid

  # =========================================================================
  # Watchtower (optional) — automatic container updates
  # Uncomment to enable. Monitors vibeDebrid for new Docker Hub images
  # and automatically pulls + restarts when updates are available.
  # =========================================================================

  # watchtower:
  #   image: containrrr/watchtower:latest
  #   container_name: watchtower
  #   restart: unless-stopped
  #   environment:
  #     WATCHTOWER_CLEANUP: "true"
  #     WATCHTOWER_INCLUDE_STOPPED: "false"
  #     WATCHTOWER_POLL_INTERVAL: "21600"  # 6 hours
  #     WATCHTOWER_SCOPE: vibedebrid
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock:ro
  #   labels:
  #     com.centurylinklabs.watchtower.scope: vibedebrid
  #   networks:
  #     - vibedebrid

networks:
  vibedebrid:
    driver: bridge

volumes:
  postgres_data:
    driver: local
