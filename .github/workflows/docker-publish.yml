name: Docker Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: vibemonarch/vibedebrid
          tags: |
            # For any tag: push :dev
            type=raw,value=dev,enable=${{ github.ref_type == 'tag' }}
            # For minor/major releases (v*.*.0): push :latest + version tags
            type=semver,pattern={{version}},enable=${{ endsWith(github.ref_name, '.0') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ endsWith(github.ref_name, '.0') }}
            type=raw,value=latest,enable=${{ endsWith(github.ref_name, '.0') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
