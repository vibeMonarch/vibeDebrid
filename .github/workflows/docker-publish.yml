name: Docker Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if stable release
        id: check
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PATCH="${TAG##*.}"
          if [ "$PATCH" = "0" ]; then
            echo "is_stable=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: vibemonarch/vibedebrid
          tags: |
            type=raw,value=dev
            type=semver,pattern={{version}},enable=${{ steps.check.outputs.is_stable == 'true' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ steps.check.outputs.is_stable == 'true' }}
            type=raw,value=latest,enable=${{ steps.check.outputs.is_stable == 'true' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
