{% extends "base.html" %}

{% block title %}Movie Detail - vibeDebrid{% endblock %}

{% block head %}
<style>
  .backdrop-overlay {
    background: linear-gradient(to bottom, rgba(15,23,42,0.5) 0%, rgba(15,23,42,1) 100%);
  }
  .status-badge-in_queue   { background-color: rgba(99,102,241,0.2); color: #818cf8; }
  .status-badge-in_library { background-color: rgba(34,197,94,0.2);  color: #22c55e; }
  .status-badge-complete   { background-color: rgba(34,197,94,0.2);  color: #22c55e; }
  .status-badge-done       { background-color: rgba(16,185,129,0.2); color: #10b981; }
</style>
{% endblock %}

{% block content %}
<!-- Back link -->
<div class="px-4 lg:px-8 pt-4">
  <a id="back-link" href="/discover"
     class="inline-flex items-center gap-2 text-vd-muted hover:text-white transition-colors text-sm">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
    </svg>
    Back to Discover
  </a>
</div>
<script>
  (function () {
    var params = new URLSearchParams(window.location.search);
    var fromDiscover = params.get('from') === 'discover';
    var backLink = document.getElementById('back-link');
    if (fromDiscover) {
      backLink.addEventListener('click', function (e) {
        e.preventDefault();
        window.location.href = '/discover';
      });
    }
  }());
</script>

<!-- Loading state -->
<div id="movie-loading" class="flex items-center justify-center h-64">
  <div class="text-center">
    <svg class="spinner w-8 h-8 text-vd-accent mx-auto mb-3" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
    </svg>
    <p class="text-vd-muted text-sm">Loading movie details...</p>
  </div>
</div>

<!-- Error state (hidden by default) -->
<div id="movie-error" class="hidden px-4 lg:px-8 py-16 text-center">
  <p class="text-vd-danger text-lg font-semibold mb-2">Failed to load movie</p>
  <p id="movie-error-msg" class="text-vd-muted text-sm mb-4"></p>
  <a href="/discover" class="text-vd-accent hover:text-vd-accent-hover text-sm">Return to Discover</a>
</div>

<!-- Main content (hidden until loaded) -->
<div id="movie-content" class="hidden">

  <!-- Hero / backdrop -->
  <div id="movie-hero" class="relative mb-6 overflow-hidden rounded-none lg:rounded-lg mx-0 lg:mx-8 lg:mt-4">
    <div id="movie-backdrop" class="h-48 lg:h-64 bg-vd-card bg-cover bg-center bg-no-repeat"></div>
    <div class="backdrop-overlay absolute inset-0"></div>
    <div class="absolute bottom-0 left-0 right-0 p-4 lg:p-6 flex gap-4 items-end">
      <img id="movie-poster"
           class="w-20 h-28 lg:w-28 lg:h-40 object-cover rounded-lg shadow-xl flex-shrink-0 hidden"
           alt="" />
      <div class="min-w-0">
        <h1 id="movie-title" class="text-2xl lg:text-3xl font-bold text-white leading-tight truncate"></h1>
        <div class="flex flex-wrap items-center gap-2 mt-1 text-sm text-vd-muted">
          <span id="movie-year"></span>
          <span id="movie-runtime-dot" class="hidden">·</span>
          <span id="movie-runtime"></span>
          <span id="movie-rating-dot" class="hidden">·</span>
          <span id="movie-rating"></span>
        </div>
        <div id="movie-genres" class="flex flex-wrap gap-1.5 mt-2"></div>
      </div>
    </div>
  </div>

  <!-- OMDb Ratings -->
  <div class="px-4 lg:px-8 mb-3">
    <div id="movie-ratings" class="flex items-center gap-4 flex-wrap hidden">
      <!-- IMDb -->
      <div id="rating-imdb" class="hidden flex items-center gap-1.5">
        <span class="text-xs font-semibold text-yellow-400">IMDb</span>
        <span id="rating-imdb-value" class="text-sm text-white font-medium"></span>
        <span id="rating-imdb-votes" class="text-xs text-vd-muted"></span>
      </div>
      <!-- Rotten Tomatoes -->
      <div id="rating-rt" class="hidden flex items-center gap-1.5">
        <span id="rating-rt-icon" class="text-sm"></span>
        <span id="rating-rt-value" class="text-sm text-white font-medium"></span>
      </div>
      <!-- Metascore -->
      <div id="rating-meta" class="hidden flex items-center gap-1.5">
        <span id="rating-meta-badge" class="text-xs font-bold px-1.5 py-0.5 rounded"></span>
        <span class="text-xs text-vd-muted">Metascore</span>
      </div>
    </div>
  </div>

  <!-- Overview -->
  <div class="px-4 lg:px-8 mb-6">
    <p id="movie-overview" class="text-vd-muted text-sm leading-relaxed"></p>
  </div>

  <!-- Add to Queue / status -->
  <div class="px-4 lg:px-8 mb-8">
    <button id="movie-add-btn"
            onclick="addMovie()"
            class="hidden inline-flex items-center gap-2 px-6 py-3 bg-vd-accent hover:bg-vd-accent-hover text-white text-sm font-medium rounded-lg transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
      </svg>
      Add to Queue
    </button>
    <!-- Shown when movie is already in queue or library -->
    <div id="movie-status" class="hidden">
      <span id="movie-status-badge" class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-sm font-medium"></span>
    </div>
  </div>

</div><!-- /movie-content -->
{% endblock %}

{% block scripts %}
<script>var PAGE_DATA = { tmdbId: {{ tmdb_id }} };</script>
<script src="/static/js/movie.js?v={{ js_version }}"></script>
{% endblock %}
