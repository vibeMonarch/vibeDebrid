{% extends "base.html" %}

{% block title %}Show Detail - vibeDebrid{% endblock %}

{% block head %}
<style>
  .backdrop-overlay {
    background: linear-gradient(to bottom, rgba(15,23,42,0.5) 0%, rgba(15,23,42,1) 100%);
  }
  .season-card {
    transition: background-color 0.15s ease;
  }
  .season-card:hover {
    background-color: rgba(255,255,255,0.05);
  }
  .season-checkbox:checked + .season-card {
    border-color: #6366f1;
    background-color: rgba(99,102,241,0.1);
  }
  .status-badge-available    { background-color: #1e293b; color: #94a3b8; }
  .status-badge-in_queue     { background-color: rgba(99,102,241,0.2); color: #818cf8; }
  .status-badge-in_library   { background-color: rgba(34,197,94,0.2); color: #22c55e; }
  .status-badge-upcoming     { background-color: rgba(245,158,11,0.2); color: #f59e0b; }
  .status-badge-airing       { background-color: rgba(56,189,248,0.2); color: #38bdf8; }
  .status-badge-airing::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background-color: #38bdf8;
    margin-right: 4px;
    animation: pulse-dot 2s ease-in-out infinite;
    vertical-align: middle;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .season-check-icon { color: #22c55e; flex-shrink: 0; }
  .season-card.status-in_queue .season-check-icon { color: #818cf8; }
</style>
{% endblock %}

{% block content %}
<!-- Back link -->
<div class="px-4 lg:px-8 pt-4">
  <a id="back-link" href="/discover"
     class="inline-flex items-center gap-2 text-vd-muted hover:text-white transition-colors text-sm">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
    </svg>
    Back to Discover
  </a>
</div>
<script>
  // If we came from discover, navigate to /discover so it auto-restores sessionStorage state
  (function () {
    var fromDiscover = new URLSearchParams(window.location.search).get('from') === 'discover';
    var backLink = document.getElementById('back-link');
    if (fromDiscover) {
      backLink.addEventListener('click', function (e) {
        e.preventDefault();
        window.location.href = '/discover';
      });
    }
  }());
</script>

<!-- Loading state -->
<div id="show-loading" class="flex items-center justify-center h-64">
  <div class="text-center">
    <svg class="spinner w-8 h-8 text-vd-accent mx-auto mb-3" fill="none" viewBox="0 0 24 24">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
    </svg>
    <p class="text-vd-muted text-sm">Loading show details...</p>
  </div>
</div>

<!-- Error state (hidden by default) -->
<div id="show-error" class="hidden px-4 lg:px-8 py-16 text-center">
  <p class="text-vd-danger text-lg font-semibold mb-2">Failed to load show</p>
  <p id="show-error-msg" class="text-vd-muted text-sm mb-4"></p>
  <a href="/discover" class="text-vd-accent hover:text-vd-accent-hover text-sm">Return to Discover</a>
</div>

<!-- Main content (hidden until loaded) -->
<div id="show-content" class="hidden">

  <!-- Hero / backdrop -->
  <div id="show-hero" class="relative mb-6 overflow-hidden rounded-none lg:rounded-lg mx-0 lg:mx-8 lg:mt-4">
    <div id="show-backdrop" class="h-48 lg:h-64 bg-vd-card bg-cover bg-center bg-no-repeat"></div>
    <div class="backdrop-overlay absolute inset-0"></div>
    <div class="absolute bottom-0 left-0 right-0 p-4 lg:p-6 flex gap-4 items-end">
      <img id="show-poster"
           class="w-20 h-28 lg:w-28 lg:h-40 object-cover rounded-lg shadow-xl flex-shrink-0 hidden"
           alt="" />
      <div class="min-w-0">
        <h1 id="show-title" class="text-2xl lg:text-3xl font-bold text-white leading-tight truncate"></h1>
        <div class="flex flex-wrap items-center gap-2 mt-1 text-sm text-vd-muted">
          <span id="show-year"></span>
          <span id="show-status-dot" class="hidden">·</span>
          <span id="show-status"></span>
          <span id="show-rating-dot" class="hidden">·</span>
          <span id="show-rating"></span>
        </div>
        <div id="show-genres" class="flex flex-wrap gap-1.5 mt-2"></div>
      </div>
    </div>
  </div>

  <!-- Overview -->
  <div class="px-4 lg:px-8 mb-6">
    <p id="show-overview" class="text-vd-muted text-sm leading-relaxed"></p>
  </div>

  <!-- Seasons section -->
  <div class="px-4 lg:px-8 mb-4 flex items-center justify-between gap-4">
    <div class="flex items-center gap-2">
      <h2 class="text-lg font-semibold text-white">Seasons</h2>
      <span id="xem-indicator"
            class="hidden text-xs text-vd-muted bg-vd-card border border-vd-border px-2 py-0.5 rounded-full">
        Scene numbering
      </span>
    </div>
    <div class="flex items-center gap-3 text-sm">
      <button type="button" id="btn-select-all"
              onclick="selectAllSeasons()"
              class="text-vd-accent hover:text-vd-accent-hover transition-colors">
        Select all
      </button>
      <span class="text-vd-border">|</span>
      <button type="button" id="btn-select-available"
              onclick="selectAvailableSeasons()"
              class="text-vd-accent hover:text-vd-accent-hover transition-colors">
        Select available
      </button>
    </div>
  </div>

  <!-- Season grid -->
  <div id="seasons-grid" class="px-4 lg:px-8 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 mb-8">
    <!-- Populated by JS -->
  </div>

  <!-- Add bar (sticky at bottom) -->
  <div id="add-bar"
       class="sticky bottom-0 z-10 bg-vd-bg border-t border-vd-border px-4 lg:px-8 py-3 flex flex-col sm:flex-row items-start sm:items-center gap-3">

    <!-- Quality profile -->
    <div class="flex items-center gap-2 flex-shrink-0">
      <label for="quality-select" class="text-sm text-vd-muted">Profile</label>
      <select id="quality-select"
              class="bg-vd-card border border-vd-border rounded px-2 py-1 text-sm text-white focus:outline-none focus:border-vd-accent">
      </select>
    </div>

    <!-- Subscribe toggle -->
    <label class="flex items-center gap-2 cursor-pointer flex-shrink-0">
      <input type="checkbox" id="subscribe-toggle"
             class="w-4 h-4 accent-indigo-500 rounded" />
      <span class="text-sm text-vd-muted">Monitor for new episodes</span>
    </label>

    <div class="flex-1"></div>

    <!-- Selection count & add button -->
    <div class="flex items-center gap-3 w-full sm:w-auto">
      <span id="selection-count" class="text-sm text-vd-muted hidden">
        <span id="count-num">0</span> selected
      </span>
      <button type="button" id="btn-add"
              onclick="addSelectedSeasons()"
              disabled
              class="w-full sm:w-auto px-5 py-2 bg-vd-accent hover:bg-vd-accent-hover disabled:opacity-40 disabled:cursor-not-allowed text-white text-sm font-medium rounded-lg transition-colors">
        Add to Queue
      </button>
    </div>
  </div>

</div><!-- /show-content -->

<script>
(function () {
  'use strict';

  const TMDB_ID = {{ tmdb_id }};
  let _showData = null;

  // ---- Fetch and render ----

  async function loadShow() {
    try {
      const resp = await fetch(`/api/show/${TMDB_ID}`);
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: resp.statusText }));
        showError(err.detail || 'Unknown error');
        return;
      }
      _showData = await resp.json();
      render(_showData);
    } catch (e) {
      showError('Network error: ' + e.message);
    }
  }

  function showError(msg) {
    document.getElementById('show-loading').classList.add('hidden');
    const errEl = document.getElementById('show-error');
    document.getElementById('show-error-msg').textContent = msg;
    errEl.classList.remove('hidden');
  }

  function render(data) {
    document.getElementById('show-loading').classList.add('hidden');

    // Hero
    if (data.backdrop_url) {
      document.getElementById('show-backdrop').style.backgroundImage = `url('${data.backdrop_url}')`;
    }
    if (data.poster_url) {
      const img = document.getElementById('show-poster');
      img.src = data.poster_url;
      img.alt = data.title;
      img.classList.remove('hidden');
    }
    document.getElementById('show-title').textContent = data.title;

    if (data.year) {
      document.getElementById('show-year').textContent = data.year;
    }
    if (data.show_status) {
      document.getElementById('show-status-dot').classList.remove('hidden');
      document.getElementById('show-status').textContent = data.show_status;
    }
    if (data.vote_average > 0) {
      document.getElementById('show-rating-dot').classList.remove('hidden');
      document.getElementById('show-rating').textContent = '★ ' + data.vote_average.toFixed(1);
    }

    // Genres
    const genresEl = document.getElementById('show-genres');
    (data.genres || []).forEach(g => {
      const chip = document.createElement('span');
      chip.className = 'px-2 py-0.5 bg-white/10 text-white/70 text-xs rounded-full';
      chip.textContent = g;
      genresEl.appendChild(chip);
    });

    // Overview
    document.getElementById('show-overview').textContent = data.overview || '';

    // Quality profiles
    const qSelect = document.getElementById('quality-select');
    (data.quality_profiles || []).forEach(p => {
      const opt = document.createElement('option');
      opt.value = p;
      opt.textContent = p;
      if (p === data.default_profile) opt.selected = true;
      qSelect.appendChild(opt);
    });

    // Subscribe toggle
    const subToggle = document.getElementById('subscribe-toggle');
    subToggle.checked = data.is_subscribed || false;

    // Seasons grid
    renderSeasons(data.seasons || []);

    // XEM scene-numbering indicator
    const hasXem = (data.seasons || []).some(s => s.xem_mapped);
    document.getElementById('xem-indicator').classList.toggle('hidden', !hasXem);

    document.getElementById('show-content').classList.remove('hidden');
  }

  function statusLabel(status) {
    const labels = {
      available: 'Available',
      in_queue: 'In Queue',
      in_library: 'In Library',
      upcoming: 'Upcoming',
      airing: 'Airing',
    };
    return labels[status] || status;
  }

  function renderSeasons(seasons) {
    const grid = document.getElementById('seasons-grid');
    grid.innerHTML = '';

    seasons.forEach(s => {
      const isDisabled = s.status === 'in_library' || s.status === 'in_queue' || s.status === 'upcoming';
      const checkId = `season-${s.season_number}`;

      const wrapper = document.createElement('label');
      wrapper.className = 'relative block cursor-pointer';
      if (isDisabled) wrapper.style.cursor = 'default';

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.id = checkId;
      cb.value = s.season_number;
      cb.className = 'season-checkbox sr-only';
      cb.disabled = isDisabled;
      cb.addEventListener('change', updateAddBar);

      const hasCheckIcon = s.status === 'in_library' || s.status === 'in_queue';
      const card = document.createElement('div');
      card.className = `season-card border border-vd-border rounded-lg p-4 select-none ${isDisabled ? 'opacity-60' : ''} ${hasCheckIcon ? 'status-' + s.status : ''}`;

      const top = document.createElement('div');
      top.className = 'flex items-start justify-between gap-2 mb-2';

      const titleRow = document.createElement('div');
      titleRow.className = 'flex items-center gap-1.5 min-w-0';

      const title = document.createElement('div');
      title.className = 'font-medium text-white text-sm leading-tight truncate';
      title.textContent = s.name || `Season ${s.season_number}`;

      titleRow.appendChild(title);

      if (hasCheckIcon) {
        const checkSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        checkSvg.setAttribute('class', 'season-check-icon w-3.5 h-3.5 flex-shrink-0');
        checkSvg.setAttribute('fill', 'none');
        checkSvg.setAttribute('viewBox', '0 0 24 24');
        checkSvg.setAttribute('stroke', 'currentColor');
        checkSvg.setAttribute('stroke-width', '2.5');
        const checkPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        checkPath.setAttribute('stroke-linecap', 'round');
        checkPath.setAttribute('stroke-linejoin', 'round');
        checkPath.setAttribute('d', 'M5 13l4 4L19 7');
        checkSvg.appendChild(checkPath);
        titleRow.appendChild(checkSvg);
      }

      const badge = document.createElement('span');
      badge.className = `text-xs px-2 py-0.5 rounded-full flex-shrink-0 status-badge-${s.status}`;
      badge.textContent = statusLabel(s.status);

      top.appendChild(titleRow);
      top.appendChild(badge);

      const meta = document.createElement('p');
      meta.className = 'text-vd-muted text-xs';
      let epText;
      if (s.status === 'airing' && s.aired_episodes > 0 && s.aired_episodes < s.episode_count) {
        epText = `${s.aired_episodes} of ${s.episode_count} episodes aired`;
      } else if (s.episode_count > 0) {
        epText = `${s.episode_count} episode${s.episode_count !== 1 ? 's' : ''}`;
      } else {
        epText = 'No episodes';
      }
      const airText = s.air_date ? ` · ${s.air_date.substring(0, 4)}` : '';
      meta.textContent = epText + airText;

      card.appendChild(top);
      card.appendChild(meta);

      wrapper.appendChild(cb);
      wrapper.appendChild(card);
      grid.appendChild(wrapper);
    });

    updateAddBar();
  }

  function getCheckedSeasons() {
    return Array.from(document.querySelectorAll('.season-checkbox:checked')).map(
      cb => parseInt(cb.value, 10)
    );
  }

  function updateAddBar() {
    const checked = getCheckedSeasons();
    const count = checked.length;
    const subscribe = document.getElementById('subscribe-toggle').checked;

    const countEl = document.getElementById('selection-count');
    const numEl = document.getElementById('count-num');
    const addBtn = document.getElementById('btn-add');

    numEl.textContent = count;
    countEl.classList.toggle('hidden', count === 0);

    const canAdd = count > 0 || subscribe;
    addBtn.disabled = !canAdd;
  }

  // Bind subscribe toggle to update add bar
  document.getElementById('subscribe-toggle').addEventListener('change', updateAddBar);

  // ---- Selection helpers ----

  window.selectAllSeasons = function () {
    document.querySelectorAll('.season-checkbox:not(:disabled)').forEach(cb => {
      cb.checked = true;
    });
    updateAddBar();
  };

  window.selectAvailableSeasons = function () {
    document.querySelectorAll('.season-checkbox:not(:disabled)').forEach(cb => {
      const val = parseInt(cb.value, 10);
      const season = (_showData?.seasons || []).find(s => s.season_number === val);
      cb.checked = season && (season.status === 'available' || season.status === 'airing');
    });
    updateAddBar();
  };

  // ---- Add to queue ----

  window.addSelectedSeasons = async function () {
    if (!_showData) return;

    const seasons = getCheckedSeasons();
    const subscribe = document.getElementById('subscribe-toggle').checked;
    const quality_profile = document.getElementById('quality-select').value || null;

    if (seasons.length === 0 && !subscribe) return;

    const addBtn = document.getElementById('btn-add');
    addBtn.disabled = true;
    addBtn.textContent = 'Adding...';

    try {
      const payload = {
        tmdb_id: _showData.tmdb_id,
        imdb_id: _showData.imdb_id || null,
        title: _showData.title,
        year: _showData.year || null,
        seasons: seasons,
        quality_profile: quality_profile,
        subscribe: subscribe,
      };

      const resp = await fetch('/api/show/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: resp.statusText }));
        alert('Error: ' + (err.detail || 'Failed to add seasons'));
        addBtn.disabled = false;
        addBtn.textContent = 'Add to Queue';
        return;
      }

      const result = await resp.json();
      let msg = '';
      if (result.created_items > 0) {
        if (result.created_episodes > 0 || result.created_unreleased > 0) {
          const parts = [];
          if (result.created_episodes > 0) {
            parts.push(`${result.created_episodes} episode${result.created_episodes !== 1 ? 's' : ''}`);
          }
          if (result.created_unreleased > 0) {
            parts.push(`${result.created_unreleased} upcoming`);
          }
          msg += `Added ${parts.join(' + ')} to queue. `;
        } else {
          msg += `Added ${result.created_items} season${result.created_items !== 1 ? 's' : ''} to queue. `;
        }
      }
      if (result.skipped_seasons.length > 0) {
        msg += `Skipped S${result.skipped_seasons.map(n => String(n).padStart(2, '0')).join(', S')} (already queued). `;
      }
      if (result.subscription_status === 'created') {
        msg += 'Monitoring enabled.';
      } else if (result.subscription_status === 'updated') {
        msg += 'Monitoring updated.';
      }

      addBtn.textContent = 'Added!';
      var fromDiscover = new URLSearchParams(window.location.search).get('from') === 'discover';
      if (fromDiscover) {
        // Return to Discover after brief confirmation
        setTimeout(function () { window.location.href = '/discover'; }, 1500);
      } else {
        setTimeout(function () {
          loadShow().then(function () {
            addBtn.textContent = 'Add to Queue';
          });
        }, 1200);
      }

      if (msg.trim()) {
        // Show a brief toast-style notification
        showToast(msg.trim());
      }

    } catch (e) {
      alert('Network error: ' + e.message);
      addBtn.disabled = false;
      addBtn.textContent = 'Add to Queue';
    }
  };

  function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'fixed bottom-20 left-1/2 -translate-x-1/2 bg-vd-card border border-vd-border text-white text-sm px-4 py-2 rounded-lg shadow-xl z-50 max-w-xs text-center';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
  }

  // Kick off load
  loadShow();
}());
</script>
{% endblock %}
